<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
  <p id="s">loading...</p>
  <script>
    liff.init({
      liffId: '2009878948-BRNmx1Mn',
      withLoginOnExternalBrowser: true
    })
    .then(function() {
      return liff.getFriendship();
    })
    .then(function(data) {
      document.getElementById('s').innerText = 'friendFlag: ' + data.friendFlag;
    })
    .catch(function(err) {
      document.getElementById('s').innerText = 'error: ' + JSON.stringify(err);
    });
  </script>
</body>
</html>
