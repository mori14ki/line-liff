<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
  <p id="msg">読み込み中...</p>
  <script>
    const LIFF_ID = '2009526359-uCSZ9M2s';

    liff.init({ liffId: LIFF_ID })
      .then(async () => {
        document.getElementById('msg').textContent = 'LIFF初期化成功';

        if (!liff.isLoggedIn()) {
          document.getElementById('msg').textContent = 'ログインへ移動中';
          liff.login();
          return;
        }

        document.getElementById('msg').textContent = 'プロフィール取得中';
        const profile = await liff.getProfile();
        document.getElementById('msg').textContent = '完了: ' + profile.userId;
      })
      .catch((err) => {
        document.getElementById('msg').textContent = 'エラー: ' + err.message;
      });
  </script>
</body>
</html>
