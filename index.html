<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-TWYH9DC4V0"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }

    gtag('js', new Date());

    gtag('config', 'G-TWYH9DC4V0', {
      debug_mode: true
    });
  </script>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
  <p id="s">start</p>

  <script>
    function setStatus(text) {
      document.getElementById('s').innerText = text;
      console.log(text);
    }

    setStatus('1. page loaded');

    liff.init({
      liffId: '2009878948-BRNmx1Mn',
      withLoginOnExternalBrowser: true
    })
    .then(function() {
      setStatus('2. liff.init done / isInClient=' + liff.isInClient());
      return liff.getFriendship();
    })
    .then(function(data) {
      setStatus('3. getFriendship done / friendFlag=' + data.friendFlag);

      if (data.friendFlag) {
        gtag('event', 'line_friend_add_test_liff_no_close', {
          debug_mode: true,
          event_category: 'liff_test',
          event_label: 'friend_true_no_close',
          event_callback: function () {
            setStatus('4. GA4 callback returned / no close');
          },
          event_timeout: 3000
        });

        setStatus('3.5 GA4 event fired / waiting callback');
      } else {
        setStatus('not friend');
      }
    })
    .catch(function(err) {
      setStatus('error: ' + JSON.stringify(err));
    });
  </script>
</body>
</html>
