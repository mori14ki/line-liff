<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- GA4 asyncなしで同期読み込み -->
  <script src="https://www.googletagmanager.com/gtag/js?id=G-TWYH9DC4V0"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-TWYH9DC4V0');
  </script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
  <script>
    liff.init({
      liffId: '2009878948-BRNmx1Mn',
      withLoginOnExternalBrowser: true
    })
    .then(function() {
      return liff.getFriendship();
    })
    .then(function(data) {
      if (data.friendFlag) {
        gtag('event', 'line_friend_add', {
          event_callback: function() {
            liff.closeWindow();
          }
        });
      } else {
        liff.closeWindow();
      }
    })
    .catch(function(err) {
      liff.closeWindow();
    });
  </script>
</body>
</html>
