<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
  <p id="msg">読み込み中...</p>
  <script>
    const LIFF_ID = '2009526359-uCSZ9M2s';

    liff.init({ liffId: LIFF_ID })
      .then(async () => {
        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        const profile = await liff.getProfile();
        const userId = profile.userId;

        // refを取得
        const params = new URLSearchParams(window.location.search);
        const liffState = params.get('liff.state') || '';
        const stateParams = new URLSearchParams(liffState.replace(/^\?/, ''));
        const ref = stateParams.get('ref') || params.get('ref') || 'direct';

        document.getElementById('msg').textContent = 'ref: ' + ref + ' / userId: ' + userId;

        // DB保存
        await fetch('https://rtjaizuykbaojhdhjvcg.supabase.co/functions/v1/save-user', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user_id: userId, ref: ref }),
        });

        // 友だち追加ページへ
        window.location.href = 'https://line.me/R/ti/p/@101ddfgc';
      })
      .catch((err) => {
        document.getElementById('msg').textContent = 'エラー: ' + err.message;
      });
  </script>
</body>
</html>
