<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://www.googletagmanager.com/gtag/js?id=G-TWYH9DC4V0"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-TWYH9DC4V0');
  </script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
  <p id="s">loading...</p>
  <script>
    liff.init({
      liffId: '2009878948-BRNmx1Mn',
      withLoginOnExternalBrowser: true
    })
    .then(function() {
      return liff.getFriendship();
    })
    .then(function(data) {
      if (data.friendFlag) {
        gtag('event', 'line_friend_add');
        document.getElementById('s').innerText = 'sent';
      } else {
        document.getElementById('s').innerText = 'not friend';
      }
    })
    .catch(function(err) {
      document.getElementById('s').innerText = 'error: ' + JSON.stringify(err);
    });
  </script>
</body>
</html>
