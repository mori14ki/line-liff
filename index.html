<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #06C755;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top: 3px solid white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <script>
    const LIFF_ID = '2009526359-uCSZ9M2s';

    liff.init({ liffId: LIFF_ID })
      .then(async () => {
        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        const profile = await liff.getProfile();
        const params = new URLSearchParams(window.location.search);
        const liffState = params.get('liff.state') || '';
        const stateParams = new URLSearchParams(liffState.replace(/^\?/, ''));
        const ref = stateParams.get('ref') || params.get('ref') || 'direct';

        await fetch('https://rtjaizuykbaojhdhjvcg.supabase.co/functions/v1/save-user', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user_id: profile.userId, ref: ref }),
        });

        window.location.href = 'https://line.me/R/ti/p/@101ddfgc';
      })
      .catch(() => {
        window.location.href = 'https://line.me/R/ti/p/@101ddfgc';
      });
  </script>
</body>
</html>
