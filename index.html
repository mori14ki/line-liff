<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-TWYH9DC4V0"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }

    gtag('js', new Date());

    gtag('config', 'G-TWYH9DC4V0', {
      debug_mode: true
    });
  </script>
</head>
<body>
  <p id="s">loading...</p>

  <script>
    function setStatus(text) {
      document.getElementById('s').innerText = text;
    }

    window.addEventListener('load', function () {
      setStatus('loaded. sending ga4...');

      gtag('event', 'line_friend_add_test_webview_no_liff', {
        debug_mode: true,
        event_category: 'liff_test',
        event_label: 'webview_no_liff_no_close',
        event_callback: function () {
          setStatus('ga4 callback returned. keep this screen open.');
        },
        event_timeout: 3000
      });

      setTimeout(function () {
        setStatus('3 seconds passed. keep this screen open.');
      }, 3000);
    });
  </script>
</body>
</html>
