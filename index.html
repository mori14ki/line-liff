<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>LINE Friend Add CV - GTM GA4 Test</title>

  <script>
    window.dataLayer = window.dataLayer || [];
  </script>

  <!-- Google Tag Manager -->
  <script>
    (function(w,d,s,l,i){
      w[l]=w[l]||[];
      w[l].push({'gtm.start': new Date().getTime(), event:'gtm.js'});
      var f=d.getElementsByTagName(s)[0],
          j=d.createElement(s),
          dl=l!='dataLayer'?'&l='+l:'';
      j.async=true;
      j.src='https://www.googletagmanager.com/gtm.js?id='+i+dl;
      f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-P5VHKJL6');
  </script>
  <!-- End Google Tag Manager -->

  <!-- LIFF SDK -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 24px;
      text-align: center;
      color: #222;
    }

    #v {
      font-size: 12px;
      color: #777;
      margin-bottom: 12px;
    }

    #s {
      font-size: 16px;
      line-height: 1.7;
      word-break: break-word;
      font-weight: 600;
    }
  </style>
</head>

<body>
  <!-- Google Tag Manager noscript -->
  <noscript>
    <iframe src="https://www.googletagmanager.com/ns.html?id=GTM-P5VHKJL6"
      height="0" width="0" style="display:none;visibility:hidden"></iframe>
  </noscript>
  <!-- End Google Tag Manager noscript -->

  <p id="v">version: gtm-ga4-test-20260428-3</p>
  <p id="s">loading...</p>

  <script>
    const VERSION = 'gtm-ga4-test-20260428-3';
    const LIFF_ID = '2009878948-BRNmx1Mn';
    const GTM_EVENT_NAME = 'line_friend_add';

    let closeStarted = false;

    function setStatus(text) {
      const statusEl = document.getElementById('s');
      if (statusEl) {
        statusEl.innerText = text;
      }
      console.log(text);
    }

    function closeLiffSafely(reason) {
      if (closeStarted) return;
      closeStarted = true;

      setStatus('closing... reason=' + reason);

      setTimeout(function () {
        if (typeof liff !== 'undefined' && liff.isInClient()) {
          liff.closeWindow();
        } else {
          setStatus('not in LINE client. close skipped. reason=' + reason);
        }
      }, 500);
    }

    function pushGtmEventAndClose() {
      setStatus('pushing gtm event...');

      window.dataLayer = window.dataLayer || [];

      window.dataLayer.push({
        event: GTM_EVENT_NAME,
        line_friend_status: 'friend_true',
        line_liff_id: LIFF_ID,
        debug_version: VERSION,

        eventCallback: function () {
          setStatus('gtm eventCallback returned.');
          closeLiffSafely('gtm_event_callback');
        },

        eventTimeout: 5000
      });

      setStatus('gtm event pushed. waiting callback...');
    }

    function formatError(err) {
      if (!err) return 'unknown error';

      const parts = [];
      parts.push('String(err): ' + String(err));

      if (typeof err === 'object') {
        parts.push('name: ' + (err.name || '(none)'));
        parts.push('message: ' + (err.message || '(none)'));
        parts.push('code: ' + (err.code || '(none)'));

        try {
          parts.push('json: ' + JSON.stringify(err));
        } catch (e) {
          parts.push('json: stringify failed');
        }
      }

      return parts.join(' / ');
    }

    setStatus('start / version=' + VERSION);

    if (typeof liff === 'undefined') {
      setStatus('error: LIFF SDK not loaded');
    } else {
      liff.init({
        liffId: LIFF_ID,
        withLoginOnExternalBrowser: true
      })
      .then(function () {
        setStatus('liff.init done');
        return liff.getFriendship();
      })
      .then(function (friendship) {
        setStatus('friendFlag=' + friendship.friendFlag);

        if (!friendship.friendFlag) {
          setStatus('not friend. no cv.');
          return;
        }

        pushGtmEventAndClose();
      })
      .catch(function (err) {
        setStatus('error: ' + formatError(err));
      });
    }
  </script>
</body>
</html>
