<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>LINE Friend Add CV Debug</title>

  <!-- GA4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-TWYH9DC4V0"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }

    gtag('js', new Date());

    gtag('config', 'G-TWYH9DC4V0', {
      debug_mode: true
    });
  </script>

  <!-- LIFF SDK -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 24px;
      color: #222;
    }

    #v {
      font-size: 12px;
      color: #777;
      margin-bottom: 12px;
      text-align: center;
    }

    #s {
      font-size: 16px;
      line-height: 1.7;
      word-break: break-word;
      text-align: center;
      margin-bottom: 16px;
    }

    #log {
      font-size: 12px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      background: #f5f5f5;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 12px;
    }
  </style>
</head>

<body>
  <p id="v">version: debug-error-visible-20260424-2</p>
  <p id="s">loading...</p>
  <pre id="log"></pre>

  <script>
    const VERSION = 'debug-error-visible-20260424-2';
    const LIFF_ID = '2009878948-BRNmx1Mn';
    const GA4_EVENT_NAME = 'line_friend_add';

    let closeStarted = false;

    function setStatus(text) {
      const statusEl = document.getElementById('s');
      if (statusEl) {
        statusEl.innerText = text;
      }
      addLog(text);
      console.log(text);
    }

    function addLog(text) {
      const logEl = document.getElementById('log');
      if (!logEl) return;

      const now = new Date().toLocaleTimeString();
      logEl.textContent += '[' + now + '] ' + text + '\n';
    }

    function formatError(err) {
      const parts = [];

      parts.push('String(err): ' + String(err));

      if (err && typeof err === 'object') {
        parts.push('name: ' + (err.name || '(none)'));
        parts.push('message: ' + (err.message || '(none)'));
        parts.push('code: ' + (err.code || '(none)'));

        try {
          parts.push('keys: ' + Object.keys(err).join(','));
        } catch (e) {
          parts.push('keys: failed');
        }

        try {
          parts.push('json: ' + JSON.stringify(err));
        } catch (e) {
          parts.push('json: stringify failed');
        }

        if (err.stack) {
          parts.push('stack: ' + err.stack);
        }
      }

      return parts.join('\n');
    }

    function closeLiffSafely() {
      if (closeStarted) return;
      closeStarted = true;

      setStatus('sent. closing...');

      setTimeout(function () {
        if (typeof liff !== 'undefined' && liff.isInClient()) {
          liff.closeWindow();
        } else {
          setStatus('sent. not in LINE client.');
        }
      }, 500);
    }

    function fireGa4AndClose() {
      setStatus('sending...');

      let callbackReturned = false;

      gtag('event', GA4_EVENT_NAME, {
        debug_mode: true,
        event_category: 'liff',
        event_label: 'friend_true',
        event_callback: function () {
          callbackReturned = true;
          setStatus('ga4 callback returned');
          closeLiffSafely();
        },
        event_timeout: 3000
      });

      setTimeout(function () {
        if (!callbackReturned) {
          setStatus('ga4 callback timeout fallback');
          closeLiffSafely();
        }
      }, 3500);
    }

    setStatus('start / version=' + VERSION);
    addLog('current URL: ' + location.href);
    addLog('userAgent: ' + navigator.userAgent);

    if (typeof liff === 'undefined') {
      setStatus('error: LIFF SDK not loaded');
    } else {
      addLog('LIFF SDK loaded');

      liff.init({
        liffId: LIFF_ID,
        withLoginOnExternalBrowser: true
      })
      .then(function () {
        setStatus('liff.init done');
        addLog('isInClient: ' + liff.isInClient());
        addLog('isLoggedIn: ' + liff.isLoggedIn());

        return liff.getFriendship();
      })
      .then(function (data) {
        setStatus('friendFlag=' + data.friendFlag);
        addLog('getFriendship response: ' + JSON.stringify(data));

        if (!data.friendFlag) {
          setStatus('not friend');
          return;
        }

        fireGa4AndClose();
      })
      .catch(function (err) {
        const errorText = formatError(err);
        setStatus('error occurred. see log.');
        addLog(errorText);
      });
    }
  </script>
</body>
</html>
